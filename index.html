<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math Game</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d1a;
      --surface:  #151528;
      --panel:    #1c1c35;
      --border:   #2e2e55;
      --accent:   #5c8aff;
      --correct:  #3ecf8e;
      --wrong:    #ff4d6d;
      --hint:     #ffb830;
      --text:     #e0e0f0;
      --muted:    #7070a0;
      --radius:   10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 40px;
      gap: 14px;
    }

    h1 {
      font-size: 1.3rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
    }

    #manual-link {
      display: block;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      text-decoration: none;
      margin-top: -4px;
      margin-bottom: 4px;
      letter-spacing: 0.05em;
    }
    #manual-link:hover { color: var(--accent); }

    /* ── Score bar ─────────────────────────────────────────── */
    #score-bar {
      font-size: 0.82rem;
      color: var(--muted);
      display: flex;
      gap: 18px;
    }
    #score-bar b { color: var(--text); }

    /* ── Picker ────────────────────────────────────────────── */
    #picker {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    #picker select, #picker button {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      padding: 7px 14px;
      font-size: 0.9rem;
      cursor: pointer;
    }
    #picker button {
      background: var(--accent);
      border-color: var(--accent);
      font-weight: 600;
    }
    #picker button:hover { filter: brightness(1.15); }

    #browse-toggle {
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 0;
      margin-bottom: 2px;
    }
    .browse-tab {
      background: var(--panel) !important;
      border: 1px solid var(--border) !important;
      color: var(--muted) !important;
      font-weight: 400 !important;
      font-size: 0.82rem !important;
      padding: 5px 18px !important;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .browse-tab:first-child { border-radius: var(--radius) 0 0 var(--radius) !important; }
    .browse-tab:last-child  { border-radius: 0 var(--radius) var(--radius) 0 !important; border-left: none !important; }
    .browse-tab.active {
      background: var(--accent) !important;
      border-color: var(--accent) !important;
      color: #fff !important;
      font-weight: 600 !important;
    }
    .browse-tab:hover:not(.active) { background: var(--surface) !important; color: var(--text) !important; }

    #concept-count {
      font-size: 0.78rem;
      color: var(--muted);
      min-width: 80px;
      align-self: center;
    }
    #concept-select { min-width: 220px; }

    /* ── Main layout ───────────────────────────────────────── */
    #layout {
      display: flex;
      gap: 16px;
      width: 100%;
      max-width: 920px;
      align-items: flex-start;
    }

    /* ── Palette ───────────────────────────────────────────── */
    #palette {
      width: 160px;
      flex-shrink: 0;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #palette-heading {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }
    #palette-empty {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.4;
    }

    .palette-item {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 12px 8px;
      cursor: grab;
      text-align: center;
      position: relative;
      user-select: none;
      transition: border-color 0.2s, box-shadow 0.2s, opacity 0.2s;
    }
    .palette-item:hover { border-color: var(--accent); }
    .palette-item.dragging { opacity: 0.35; cursor: grabbing; }
    .palette-item.used { opacity: 0.3; pointer-events: none; }
    .palette-item.hint-highlight {
      border-color: var(--hint);
      box-shadow: 0 0 16px var(--hint);
      animation: pulse 1s ease-in-out infinite alternate;
    }
    @keyframes pulse { to { box-shadow: 0 0 26px var(--hint); } }

    .pal-tip {
      display: none;
      position: absolute;
      left: calc(100% + 10px);
      top: 50%;
      transform: translateY(-50%);
      background: #22223f;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 0.76rem;
      color: var(--text);
      width: 200px;
      z-index: 100;
      pointer-events: none;
      line-height: 1.45;
    }
    .palette-item:hover .pal-tip { display: block; }

    /* ── Game area ─────────────────────────────────────────── */
    #game-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Question box */
    #question-box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      text-align: center;
      position: relative;
    }
    #puzzle-num-badge {
      position: absolute;
      top: 10px;
      right: 14px;
      font-size: 1rem;
      font-weight: 700;
      color: var(--hint);
      letter-spacing: 0.04em;
    }
    #question-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 10px;
    }
    #question-render { font-size: 1.5rem; }
    #question-plain  { font-size: 0.82rem; color: var(--muted); margin-top: 6px; }

    /* Current step box */
    #step-box {
      background: var(--panel);
      border: 2px solid var(--accent);
      border-radius: var(--radius);
      padding: 36px 24px;
      min-height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      position: relative;
    }
    #step-box.auto-step { border-color: var(--border); }

    /* Inline drop zones */
    .drop-zone {
      display: inline-block;
      border: 2px dashed var(--muted);
      border-radius: 8px;
      padding: 8px 20px;
      min-width: 2.8em;
      cursor: pointer;
      position: relative;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      vertical-align: middle;
    }
    .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(92,138,255,0.15);
    }
    .drop-zone.correct-drop {
      border-color: var(--correct);
      background: rgba(62,207,142,0.15);
      animation: flash-ok 0.4s ease-out;
    }
    .drop-zone.wrong-drop {
      animation: shake 0.35s ease-out;
    }
    .drop-zone.hint-target {
      border-color: var(--hint);
      box-shadow: 0 0 12px var(--hint);
      background: rgba(255,184,48,0.12);
      animation: pulse 1s ease-in-out infinite alternate;
    }
    .drop-zone.done {
      border: 2px solid var(--correct);
      background: rgba(62,207,142,0.10);
      cursor: default;
    }

    @keyframes flash-ok {
      0%   { background: rgba(62,207,142,0.45); }
      100% { background: rgba(62,207,142,0.15); }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%     { transform: translateX(-7px); }
      75%     { transform: translateX(7px); }
    }

    /* Step meta row */
    #step-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.83rem;
    }
    #step-desc { color: var(--muted); font-style: italic; }
    #step-progress { color: var(--text); font-weight: 600; }

    /* Both-sides message */
    #side-message {
      text-align: center;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--hint);
      min-height: 1.4em;
      transition: opacity 0.3s;
    }
    #side-message.hidden-msg { opacity: 0; }

    /* Auto-step label */
    #auto-label {
      position: absolute;
      top: 10px;
      right: 14px;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    /* Controls */
    #controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .ctrl-btn {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 0.88rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .ctrl-btn:hover { background: var(--surface); border-color: var(--accent); }
    .ctrl-btn:disabled { opacity: 0.35; cursor: default; pointer-events: none; }
    .ctrl-btn.primary { background: var(--accent); border-color: var(--accent); font-weight: 600; }
    .ctrl-btn.primary:hover { filter: brightness(1.15); }
    .ctrl-btn.nav { font-size: 1rem; padding: 8px 18px; }

    /* Notes button badge */
    #notes-btn { position: relative; }
    #notes-btn .badge {
      position: absolute;
      top: 4px; right: 4px;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--hint);
      display: none;
    }
    #notes-btn.has-notes .badge { display: block; }

    /* Notes modal overlay */
    #notes-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 8000;
      align-items: center;
      justify-content: center;
    }
    #notes-modal.open { display: flex; }

    #notes-drawer {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: min(580px, 92vw);
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 16px 48px rgba(0,0,0,0.6);
      overflow: hidden;
    }

    #notes-drawer header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #notes-drawer header h2 {
      font-size: 0.85rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0;
    }
    #notes-drawer header .puzzle-title {
      font-size: 0.88rem;
      color: var(--accent);
      font-weight: 600;
    }
    #notes-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.3rem;
      cursor: pointer;
      line-height: 1;
      padding: 2px 6px;
      border-radius: 4px;
    }
    #notes-close:hover { color: var(--text); background: var(--panel); }

    #notes-body { padding: 16px 20px 20px; display: flex; flex-direction: column; gap: 10px; flex: 1; min-height: 0; }

    #notes-textarea {
      flex: 1;
      min-height: 220px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: system-ui, sans-serif;
      font-size: 0.92rem;
      line-height: 1.6;
      padding: 12px 14px;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }
    #notes-textarea:focus { border-color: var(--accent); }
    #notes-textarea::placeholder { color: var(--muted); }

    #notes-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-shrink: 0;
    }
    #notes-status {
      font-size: 0.75rem;
      color: var(--muted);
      min-width: 80px;
    }
    #notes-clear {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 7px;
      padding: 6px 14px;
      font-size: 0.82rem;
      cursor: pointer;
    }
    #notes-clear:hover { border-color: var(--wrong); color: var(--wrong); }

    /* Completion banner */
    #completion {
      display: none;
      background: var(--panel);
      border: 2px solid var(--correct);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      font-size: 1.1rem;
      color: var(--correct);
      font-weight: 600;
    }

    /* Puzzle diagram */
    #puzzle-img {
      margin-top: 12px;
      display: flex;
      justify-content: center;
    }
    #puzzle-img:empty { display: none; }
    #puzzle-img img, #puzzle-img svg {
      max-width: 240px;
      max-height: 160px;
      width: 100%;
      height: auto;
      border-radius: 6px;
    }

    /* SVG hover tooltip */
    #svg-tip {
      position: fixed;
      display: none;
      background: var(--panel);
      border: 1px solid var(--accent);
      color: var(--text);
      font-size: 0.8rem;
      padding: 5px 11px;
      border-radius: 7px;
      pointer-events: none;
      z-index: 10000;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }

    /* Ghost piece that flies during animated solve */
    .ghost-drag {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      border-radius: 8px;
      background: var(--surface);
      border: 2px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 28px rgba(92,138,255,0.55);
    }

    /* Step fade transition */
    #step-equation {
      transition: opacity 0.4s ease;
    }
    #step-equation.fading { opacity: 0; }

    /* Symbol tooltip (floating) */
    #sym-tip {
      position: fixed;
      background: #22223f;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.78rem;
      color: var(--text);
      z-index: 300;
      pointer-events: none;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }

    /* ── Touch / Mobile ────────────────────────────────────────── */
    button, select, .palette-item, .ctrl-btn {
      touch-action: manipulation;
    }

    .palette-item.touch-selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(92,138,255,0.4);
    }

    @media (max-width: 640px) {
      body { padding: 10px 10px 24px; gap: 8px; }

      h1 { font-size: 1.05rem; }

      #score-bar {
        flex-wrap: wrap;
        gap: 4px 10px;
        justify-content: center;
        font-size: 0.76rem;
      }

      #picker { gap: 7px; }
      #picker select { font-size: 0.82rem; padding: 6px 8px; max-width: calc(50vw - 16px); }
      #picker button  { padding: 6px 12px; font-size: 0.85rem; }

      #layout { flex-direction: column; }

      /* Palette becomes a horizontal strip */
      #palette {
        width: 100%;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
        padding: 10px;
        order: 2;
      }
      #palette-heading { width: 100%; }
      .palette-item {
        flex: 1 1 80px;
        max-width: 160px;
        padding: 10px 6px;
      }
      /* Tooltips need hover; hide on touch screens */
      .pal-tip { display: none !important; }

      #game-area { order: 1; gap: 10px; }

      #question-box { padding: 12px 14px; }
      #question-render { font-size: 1.2rem; }
      #question-plain  { font-size: 0.78rem; }
      #puzzle-num-badge { font-size: 0.9rem; top: 8px; right: 10px; }

      #step-box { font-size: 1.35rem; padding: 20px 10px; min-height: 100px; }

      #step-meta { font-size: 0.78rem; }

      .ctrl-btn     { padding: 11px 12px; font-size: 0.85rem; }
      .ctrl-btn.nav { padding: 11px 16px; font-size: 0.9rem; }
      #controls { gap: 7px; justify-content: center; }
    }
  </style>
</head>
<body>

<h1>Math Game</h1>
<a id="manual-link" href="manual.html">Player Manual</a>

<div id="score-bar">
  Solved: <b id="sc-solved">0</b>
  &nbsp;|&nbsp; Hints: <b id="sc-hints">0</b>
  &nbsp;|&nbsp; Problem: <b id="sc-num" style="color:var(--hint)">—</b>
  &nbsp;|&nbsp; ID: <b id="sc-puzzle">—</b>
</div>

<div id="picker">
  <div id="browse-toggle">
    <button class="browse-tab active" id="tab-topic">By Topic</button>
    <button class="browse-tab" id="tab-concept">By Concept</button>
  </div>
  <select id="topic-select">
    <option value="algebra.json">Algebra</option>
    <option value="arithmetic.json">Arithmetic</option>
    <option value="geometry.json">Geometry</option>
    <option value="trigonometry.json">Trigonometry</option>
    <option value="calculus.json">Calculus</option>
  </select>
  <select id="concept-select" style="display:none"><option value="">— Select a concept —</option></select>
  <span id="concept-count" style="display:none"></span>
  <select id="puzzle-select"><option>Loading…</option></select>
  <button id="load-btn">Load Puzzle</button>
</div>

<div id="layout">

  <!-- Palette -->
  <div id="palette">
    <div id="palette-heading">Palette</div>
    <div id="palette-empty">Load a puzzle to begin.</div>
  </div>

  <!-- Game area -->
  <div id="game-area">

    <div id="question-box">
      <div id="question-label">Question</div>
      <div id="puzzle-num-badge">—</div>
      <div id="question-render">—</div>
      <div id="question-plain"></div>
      <div id="puzzle-img"></div>
    </div>

    <div id="step-box" class="auto-step">
      <div id="auto-label"></div>
      <div id="step-equation"></div>
    </div>

    <div id="side-message" class="hidden-msg">—</div>

    <div id="step-meta">
      <div id="step-desc"></div>
      <div id="step-progress">—</div>
    </div>

    <div id="completion">Puzzle complete! Well done.</div>

    <div id="controls">
      <button class="ctrl-btn nav" id="prev-btn" disabled>← Prev</button>
      <button class="ctrl-btn nav" id="next-btn" disabled>Next →</button>
      <button class="ctrl-btn" id="hint-btn" disabled>Give Up This Step</button>
      <button class="ctrl-btn" id="reset-btn">Reset</button>
      <button class="ctrl-btn primary" id="final-btn">Final Answer</button>
      <button class="ctrl-btn" id="notes-btn">📝 Notes<span class="badge"></span></button>
    </div>

  </div>
</div>

<!-- Notes modal -->
<div id="notes-modal" role="dialog" aria-modal="true" aria-label="Puzzle Notes">
  <div id="notes-drawer">
    <header>
      <div>
        <h2>Notes</h2>
        <div class="puzzle-title" id="notes-puzzle-title"></div>
      </div>
      <button id="notes-close" aria-label="Close notes">✕</button>
    </header>
    <div id="notes-body">
      <textarea id="notes-textarea" placeholder="Jot down your thoughts, formulas, or reminders about this puzzle…" spellcheck="true"></textarea>
      <div id="notes-footer">
        <span id="notes-status"></span>
        <button id="notes-clear">Clear notes</button>
      </div>
    </div>
  </div>
</div>

<div id="sym-tip" style="display:none"></div>

<script>
// ── State ──────────────────────────────────────────────────────
const G = {
  puzzle:          null,
  globalSyms:      {},
  mergedSyms:      {},
  currentStep:     0,     // index into visibleSteps()
  completedDrops:  null,
  draggingId:      null,
  animating:       false, // true while ghost-drag animation is in flight
  stepVer:         0,     // increments on every step change to invalidate stale ghosts
  score:           { solved: 0, hints: 0 },
};

function visibleSteps() {
  return G.puzzle ? G.puzzle.steps : [];
}

// ── DOM ────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const topicSel   = $('topic-select');
const puzzleSel  = $('puzzle-select');
const qRender    = $('question-render');
const qPlain     = $('question-plain');
const stepBox    = $('step-box');
const stepEq     = $('step-equation');
const autoLabel  = $('auto-label');
const stepDesc   = $('step-desc');
const stepProg   = $('step-progress');
const sideMsg    = $('side-message');
const completion = $('completion');
const symTip     = $('sym-tip');
const prevBtn    = $('prev-btn');
const nextBtn    = $('next-btn');
const hintBtn    = $('hint-btn');

// ── KaTeX ──────────────────────────────────────────────────────
function renderLatex(latex, el, displayMode = false) {
  try {
    katex.render(latex, el, { throwOnError: false, displayMode });
  } catch(e) { el.textContent = latex; }
}

// ── Load global symbols ────────────────────────────────────────
async function loadGlobalSymbols() {
  try {
    const r = await fetch('puzzles/symbols.json');
    G.globalSyms = await r.json();
  } catch(e) { G.globalSyms = {}; }
}

// ── Load topic list ────────────────────────────────────────────
async function loadTopicIndex() {
  const topic = topicSel.value;
  try {
    const r = await fetch(`puzzles/${topic}`);
    const puzzles = await r.json();
    puzzleSel.innerHTML = puzzles.map((p, i) =>
      `<option value="${i}">${p.id} — ${p.question.plain} (${p.difficulty})</option>`
    ).join('');
    puzzleSel._data = puzzles;
  } catch(e) {
    puzzleSel.innerHTML = '<option>Error loading</option>';
  }
}

topicSel.addEventListener('change', loadTopicIndex);

// ── Browse mode toggle ─────────────────────────────────────────
const conceptSel  = $('concept-select');
const conceptCount = $('concept-count');
const tabTopic    = $('tab-topic');
const tabConcept  = $('tab-concept');

function setMode(mode) {
  if (mode === 'topic') {
    tabTopic.classList.add('active');
    tabConcept.classList.remove('active');
    topicSel.style.display   = '';
    conceptSel.style.display = 'none';
    conceptCount.style.display = 'none';
    puzzleSel._dataMeta = null;
    loadTopicIndex();
  } else {
    tabConcept.classList.add('active');
    tabTopic.classList.remove('active');
    topicSel.style.display   = 'none';
    conceptSel.style.display = '';
    conceptCount.style.display = '';
    conceptSel.value = '';
    puzzleSel.innerHTML = '<option>— Select a concept above —</option>';
    puzzleSel._data     = null;
    puzzleSel._dataMeta = null;
    conceptCount.textContent = '';
  }
}

tabTopic.addEventListener('click',   () => setMode('topic'));
tabConcept.addEventListener('click', () => setMode('concept'));

// ── Concept filter ─────────────────────────────────────────────
const G_topicCache = {};

async function preloadTopicCache() {
  for (const file of ['trigonometry.json', 'calculus.json']) {
    try {
      const r = await fetch(`puzzles/${file}`);
      G_topicCache[file] = await r.json();
    } catch(e) { G_topicCache[file] = []; }
  }
}

async function loadConcepts() {
  try {
    const r = await fetch('puzzles/concepts.json');
    const concepts = await r.json();
    conceptSel.innerHTML =
      '<option value="">— Select a concept —</option>' +
      concepts.map((c, i) =>
        `<option value="${i}">${c.label} (${c.puzzles.length})</option>`
      ).join('');
    conceptSel._data = concepts;
  } catch(e) {}
}

const TOPIC_META = {
  'trig': { file: 'trigonometry.json', topicIndex: 3 },
  'calc': { file: 'calculus.json',     topicIndex: 4 },
};

conceptSel.addEventListener('change', () => {
  const val = conceptSel.value;
  if (val === '') {
    puzzleSel.innerHTML = '<option>— Select a concept above —</option>';
    puzzleSel._data     = null;
    puzzleSel._dataMeta = null;
    conceptCount.textContent = '';
    return;
  }
  const concept = conceptSel._data[parseInt(val, 10)];
  if (!concept) return;

  const filtered = [];
  const meta     = [];
  for (const pid of concept.puzzles) {
    const prefix = pid.split('-')[0];
    const tm = TOPIC_META[prefix];
    if (!tm) continue;
    const arr = G_topicCache[tm.file] || [];
    const idx = arr.findIndex(p => p.id === pid);
    if (idx === -1) continue;
    filtered.push(arr[idx]);
    meta.push({ topicIndex: tm.topicIndex, puzzleIdxInTopic: idx });
  }

  puzzleSel.innerHTML = filtered.map((p, i) =>
    `<option value="${i}">[${p.id.split('-')[0].toUpperCase()}] ${p.id} — ${p.question.plain} (${p.difficulty})</option>`
  ).join('');
  puzzleSel._data     = filtered;
  puzzleSel._dataMeta = meta;
  conceptCount.textContent = `${filtered.length} puzzle${filtered.length !== 1 ? 's' : ''}`;
});

// ── Load puzzle ────────────────────────────────────────────────
function loadPuzzle() {
  const puzzles = puzzleSel._data;
  if (!puzzles) return;
  const puzzleIndex = parseInt(puzzleSel.value, 10);
  G.puzzle         = puzzles[puzzleIndex];
  G.currentStep    = 0;
  G.completedDrops = new Set();
  G.mergedSyms     = { ...G.globalSyms, ...(G.puzzle.symbols || {}) };
  completion.style.display = 'none';

  const meta = puzzleSel._dataMeta;
  const topicIndex      = meta ? meta[puzzleIndex].topicIndex        : topicSel.selectedIndex;
  const idxInTopic      = meta ? meta[puzzleIndex].puzzleIdxInTopic  : puzzleIndex;
  const globalNum       = topicIndex * 30 + idxInTopic + 1;
  $('sc-num').textContent    = `#${globalNum}`;
  $('sc-puzzle').textContent = G.puzzle.id;
  $('puzzle-num-badge').textContent = `#${globalNum}`;

  renderAll();
  loadNotes();
}

$('load-btn').addEventListener('click', loadPuzzle);

// ── SVG tooltip ────────────────────────────────────────────────
const svgTip = document.createElement('div');
svgTip.id = 'svg-tip';
document.body.appendChild(svgTip);

function setupSvgTooltips(container) {
  container.addEventListener('mousemove', e => {
    const hot = e.target.closest('[data-label]');
    if (hot) {
      svgTip.textContent = hot.dataset.label;
      svgTip.style.display = 'block';
      svgTip.style.left = (e.clientX + 14) + 'px';
      svgTip.style.top  = (e.clientY - 36) + 'px';
    } else {
      svgTip.style.display = 'none';
    }
  });
  container.addEventListener('mouseleave', () => { svgTip.style.display = 'none'; });
}

// ── Master render ──────────────────────────────────────────────
function renderAll() {
  renderQuestion();
  renderPalette();
  renderCurrentStep();
}

// ── Question ───────────────────────────────────────────────────
function renderQuestion() {
  renderLatex(G.puzzle.question.latex, qRender);
  qPlain.textContent = G.puzzle.question.plain;
  const imgDiv = $('puzzle-img');
  if (!G.puzzle.image) { imgDiv.innerHTML = ''; return; }

  // Inline SVG so data-label hover events work (img tags block DOM events)
  fetch(`puzzles/images/${G.puzzle.image}`)
    .then(r => r.text())
    .then(svg => {
      imgDiv.innerHTML = svg;
      const el = imgDiv.querySelector('svg');
      if (el) { el.style.maxWidth = '240px'; el.style.width = '100%'; el.style.height = 'auto'; }
      setupSvgTooltips(imgDiv);
    })
    .catch(() => {
      imgDiv.innerHTML = `<img src="puzzles/images/${G.puzzle.image}" alt="diagram"/>`;
    });
}

// ── Palette ────────────────────────────────────────────────────
function renderPalette() {
  const pal = $('palette');
  pal.querySelectorAll('.palette-item').forEach(el => el.remove());
  $('palette-empty').style.display = 'none';

  G.puzzle.palette.forEach(item => {
    const div = document.createElement('div');
    div.className = 'palette-item';
    div.dataset.id = item.id;
    div.draggable = true;

    const math = document.createElement('span');
    renderLatex(item.latex, math);
    div.appendChild(math);

    const tip = document.createElement('div');
    tip.className = 'pal-tip';
    tip.textContent = item.description;
    div.appendChild(tip);

    div.addEventListener('dragstart', e => {
      G.draggingId = e.currentTarget.dataset.id;
      e.currentTarget.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    div.addEventListener('dragend', e => {
      e.currentTarget.classList.remove('dragging');
      G.draggingId = null;
    });

    // ── Touch drag: swipe palette item onto a drop zone ──────────
    div.addEventListener('touchstart', () => {
      G.draggingId = item.id;
      div.classList.add('dragging');
    }, { passive: true });

    div.addEventListener('touchmove', e => {
      e.preventDefault(); // prevent page scroll while dragging
      const t = e.touches[0];
      stepEq.querySelectorAll('.drop-zone').forEach(el => el.classList.remove('drag-over'));
      const under = document.elementFromPoint(t.clientX, t.clientY);
      const dz = under?.closest('.drop-zone:not(.done)');
      if (dz) dz.classList.add('drag-over');
    }, { passive: false });

    div.addEventListener('touchend', e => {
      div.classList.remove('dragging');
      stepEq.querySelectorAll('.drop-zone.drag-over').forEach(el => el.classList.remove('drag-over'));
      const t = e.changedTouches[0];
      const under = document.elementFromPoint(t.clientX, t.clientY);
      const dz = under?.closest('.drop-zone');
      if (dz) {
        const idx = parseInt(dz.dataset.dzIdx);
        if (!isNaN(idx) && !G.completedDrops.has(idx)) {
          handleDrop(dz, idx, G.draggingId);
        }
      }
      G.draggingId = null;
    });

    pal.appendChild(div);
  });

  syncPaletteUsed();
}

function syncPaletteUsed() {
  if (!G.puzzle) return;
  const pal = $('palette');
  pal.querySelectorAll('.palette-item').forEach(el => {
    const id = el.dataset.id;
    const usedAt = visibleSteps().findIndex(s => s.paletteRef === id);
    el.classList.toggle('used', usedAt !== -1 && usedAt < G.currentStep);
  });
}

// ── Current step ───────────────────────────────────────────────
function renderCurrentStep() {
  if (!G.puzzle) return;
  const p   = G.puzzle;
  const vs  = visibleSteps();
  const done = G.currentStep >= vs.length;

  completion.style.display = done ? 'block' : 'none';
  if (done) {
    const lastStep = p.steps[p.steps.length - 1];
    stepEq.innerHTML = '';
    renderLatex(lastStep.toLatex, stepEq, true);
    stepDesc.textContent = lastStep.description;
    stepProg.textContent = `Step ${vs.length} of ${vs.length}`;
    stepBox.classList.add('auto-step');
    autoLabel.textContent = '';
    hideSideMsg();
    syncPaletteUsed();
    updateNavButtons();
    return;
  }

  const step    = vs[G.currentStep];
  const isAuto  = !step.paletteRef;
  const targets = step.dropTargets || [];

  stepBox.classList.toggle('auto-step', isAuto);
  autoLabel.textContent = '';

  stepEq.innerHTML = '';
  if (targets.length === 0) {
    renderLatex(step.toLatex, stepEq, true);
  } else {
    buildDropZoneEquation(step.fromLatex, targets, stepEq);
  }

  stepDesc.textContent = step.description;
  stepProg.textContent = `Step ${G.currentStep + 1} of ${vs.length}`;
  hideSideMsg();
  updateNavButtons();
  syncPaletteUsed();
  attachSymbolHovers();
}

// ── Build equation with inline drop zones ──────────────────────
// Renders the FULL equation in one KaTeX call (preserving = spacing),
// using \htmlClass{dz-N}{token} to mark targets, then wraps those
// rendered elements in interactive drop zone spans.
function buildDropZoneEquation(fullLatex, targets, container) {
  const positions = [];
  for (let i = 0; i < targets.length; i++) {
    const pos = fullLatex.indexOf(targets[i]);
    if (pos !== -1) positions.push({ pos, end: pos + targets[i].length, idx: i, target: targets[i] });
  }
  positions.sort((a, b) => a.pos - b.pos);

  // Inject \htmlClass markers into the latex string
  let processed = '';
  let cur = 0;
  for (const seg of positions) {
    processed += fullLatex.slice(cur, seg.pos);
    processed += `\\htmlClass{dz-${seg.idx}}{${seg.target}}`;
    cur = seg.end;
  }
  processed += fullLatex.slice(cur);

  // Render entire equation as one KaTeX expression
  try {
    katex.render(processed, container, { throwOnError: false, displayMode: true, trust: true });
  } catch(e) { container.textContent = fullLatex; return; }

  // Post-process: find each .dz-N group and wrap it in a drop zone span
  targets.forEach((_, i) => {
    const inner = container.querySelector(`.dz-${i}`);
    if (!inner) return;
    const dz = document.createElement('span');
    dz.className = 'drop-zone' + (G.completedDrops.has(i) ? ' done' : '');
    dz.dataset.dzIdx = i;
    inner.parentNode.insertBefore(dz, inner);
    dz.appendChild(inner);
    setupDropZone(dz, i);
  });
}

function setupDropZone(dz, dzIdx) {
  dz.addEventListener('dragover', e => {
    if (!G.completedDrops.has(dzIdx)) {
      e.preventDefault();
      dz.classList.add('drag-over');
    }
  });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => {
    e.preventDefault();
    dz.classList.remove('drag-over');
    if (G.completedDrops.has(dzIdx)) return;
    handleDrop(dz, dzIdx, G.draggingId);
  });
}

function handleDrop(dz, dzIdx, paletteId) {
  const step = visibleSteps()[G.currentStep];
  clearHint();

  if (step.paletteRef === paletteId) {
    // Correct
    dz.classList.add('correct-drop');
    G.completedDrops.add(dzIdx);
    dz.classList.add('done');

    const remaining = (step.dropTargets || []).length - G.completedDrops.size;
    if (remaining > 0) {
      // More drops needed — show the other-side message
      const labels = step.dropSideLabels || [];
      const nextLabel = labels.find((_, i) => !G.completedDrops.has(i)) || 'the other side';
      showSideMsg(`✓ Good — now apply to ${nextLabel} too!`);
      // Highlight remaining drop zones
      stepEq.querySelectorAll('.drop-zone:not(.done)').forEach(el => {
        el.classList.add('hint-target');
      });
    } else {
      // All drops done — advance after brief pause
      hideSideMsg();
      setTimeout(advanceStep, 450);
    }
  } else {
    // Wrong palette item
    dz.classList.add('wrong-drop');
    setTimeout(() => dz.classList.remove('wrong-drop'), 380);
  }
}

function cancelAnimation() {
  G.animating = false;
  document.querySelectorAll('.ghost-drag').forEach(el => el.remove());
}

function advanceStep() {
  cancelAnimation();
  G.stepVer++;
  stepEq.classList.add('fading');
  setTimeout(() => {
    G.currentStep++;
    G.completedDrops = new Set();
    clearHint();
    if (G.currentStep >= visibleSteps().length) {
      G.score.solved++;
      $('sc-solved').textContent = G.score.solved;
    }
    renderCurrentStep();
    requestAnimationFrame(() => requestAnimationFrame(() => {
      stepEq.classList.remove('fading');
    }));
  }, 400);
}

// ── Hint / Give Up ─────────────────────────────────────────────
function activateHint() {
  if (!G.puzzle) return;
  const step = visibleSteps()[G.currentStep];
  if (!step || !step.paletteRef) return;

  G.score.hints++;
  $('sc-hints').textContent = G.score.hints;

  // Highlight palette item
  const palItem = $('palette').querySelector(`[data-id="${step.paletteRef}"]`);
  if (palItem) palItem.classList.add('hint-highlight');

  // Highlight all remaining drop zones and show message
  const targets = step.dropTargets || [];
  const labels  = step.dropSideLabels || [];
  const remaining = targets.filter((_, i) => !G.completedDrops.has(i));

  stepEq.querySelectorAll('.drop-zone:not(.done)').forEach(el => {
    el.classList.add('hint-target');
  });

  if (remaining.length > 1) {
    showSideMsg(`Drop onto both sides of the equation`);
  } else if (remaining.length === 1 && G.completedDrops.size > 0) {
    const idx = targets.findIndex((_, i) => !G.completedDrops.has(i));
    const label = labels[idx] || 'the other side';
    showSideMsg(`Now apply to ${label} too!`);
  }
}

function clearHint() {
  $('palette').querySelectorAll('.hint-highlight').forEach(el => el.classList.remove('hint-highlight'));
  stepEq.querySelectorAll('.hint-target').forEach(el => el.classList.remove('hint-target'));
}

$('hint-btn').addEventListener('click', activateHint);

// ── Side message ───────────────────────────────────────────────
function showSideMsg(text) {
  sideMsg.textContent = text;
  sideMsg.classList.remove('hidden-msg');
}
function hideSideMsg() {
  sideMsg.classList.add('hidden-msg');
  sideMsg.textContent = '';
}

// ── Navigation ─────────────────────────────────────────────────
function goNext() {
  if (!G.puzzle) return;
  const step = visibleSteps()[G.currentStep];
  if (!step) return;
  // Auto-advance only if no drops required
  if (!step.paletteRef) advanceStep();
}

function goPrev() {
  if (!G.puzzle || G.currentStep <= 0) return;
  cancelAnimation();
  G.stepVer++;
  G.currentStep--;
  G.completedDrops = new Set();
  clearHint();
  renderCurrentStep();
}

function updateNavButtons() {
  prevBtn.disabled = !G.puzzle || G.currentStep <= 0;
  const step = visibleSteps()[G.currentStep];
  nextBtn.disabled = !G.puzzle || !step || G.currentStep >= visibleSteps().length;
  hintBtn.disabled = !step || !step.paletteRef;
}

prevBtn.addEventListener('click', goPrev);
nextBtn.addEventListener('click', playNextStep);

$('reset-btn').addEventListener('click', () => {
  if (!G.puzzle) return;
  G.currentStep    = 0;
  G.completedDrops = new Set();
  clearHint();
  completion.style.display = 'none';
  renderAll();
});

$('final-btn').addEventListener('click', () => {
  if (!G.puzzle) return;
  const last = G.puzzle.steps[G.puzzle.steps.length - 1];
  // Show final answer in step box
  stepEq.innerHTML = '';
  renderLatex(last.toLatex, stepEq, true);
  stepDesc.textContent = 'Final answer';
  const _vs = visibleSteps();
  stepProg.textContent = `Step ${_vs.length} of ${_vs.length}`;
  stepBox.classList.add('auto-step');
  autoLabel.textContent = '';
  hideSideMsg();
  completion.style.display = 'block';
  G.currentStep    = visibleSteps().length;
  G.completedDrops = new Set();
  syncPaletteUsed();
  updateNavButtons();
});

// ── Animated right-arrow solve ─────────────────────────────────
function flyGhost(fromEl, toEl, ver, onArrive) {
  const fr = fromEl.getBoundingClientRect();
  const tr = toEl.getBoundingClientRect();

  const ghost = document.createElement('div');
  ghost.className = 'ghost-drag';
  Object.assign(ghost.style, {
    left: fr.left + 'px', top: fr.top + 'px',
    width: fr.width + 'px', height: fr.height + 'px',
    opacity: '0.92',
  });
  const inner = fromEl.querySelector('span');
  if (inner) ghost.innerHTML = inner.outerHTML;
  document.body.appendChild(ghost);

  const dx = tr.left + (tr.width  - fr.width)  / 2 - fr.left;
  const dy = tr.top  + (tr.height - fr.height) / 2 - fr.top;

  // Double-rAF ensures the browser paints the start position first
  requestAnimationFrame(() => requestAnimationFrame(() => {
    ghost.style.transition = 'transform 2s cubic-bezier(0.4, 0, 0.2, 1)';
    ghost.style.transform  = `translate(${dx}px, ${dy}px)`;
  }));

  setTimeout(() => {
    ghost.style.transition = 'opacity 0.15s';
    ghost.style.opacity = '0';
    setTimeout(() => {
      ghost.remove();
      if (G.stepVer === ver) onArrive();
    }, 160);
  }, 2000);
}

function animatedSolve() {
  if (G.animating) return;
  const step = visibleSteps()[G.currentStep];
  if (!step || !step.paletteRef) return;

  const palItem   = $('palette').querySelector(`[data-id="${step.paletteRef}"]`);
  if (!palItem) return;
  const dropZones = Array.from(stepEq.querySelectorAll('.drop-zone:not(.done)'));
  if (!dropZones.length) return;

  G.animating = true;
  const ver = G.stepVer;

  // Phase 1: highlight both for 700 ms so the user can see what will happen
  palItem.classList.add('hint-highlight');
  dropZones.forEach(dz => dz.classList.add('hint-target'));

  setTimeout(() => {
    if (G.stepVer !== ver) { G.animating = false; return; }
    palItem.classList.remove('hint-highlight');
    dropZones.forEach(dz => dz.classList.remove('hint-target'));

    // Phase 2: fly ghost from palette item to first drop zone
    flyGhost(palItem, dropZones[0], ver, () => {
      G.animating = false;
      // Complete all uncompleted drops for this step
      dropZones.forEach(dz => {
        const idx = parseInt(dz.dataset.dzIdx);
        if (!isNaN(idx) && !G.completedDrops.has(idx)) {
          handleDrop(dz, idx, step.paletteRef);
        }
      });
    });
  }, 700);
}

function playNextStep() {
  if (!G.puzzle || G.animating) return;
  const step = visibleSteps()[G.currentStep];
  if (!step) return;
  if (step.paletteRef) {
    animatedSolve();
  } else {
    advanceStep();
  }
}

// ── Keyboard ───────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') playNextStep();
  if (e.key === 'ArrowLeft')  goPrev();
});

// ── Symbol hover tooltips ──────────────────────────────────────
function attachSymbolHovers() {
  const syms = G.mergedSyms;
  if (!Object.keys(syms).length) return;

  const areas = [stepEq, qRender];
  for (const area of areas) {
    area.querySelectorAll('.katex-html .mord, .katex-html .mbin, .katex-html .mrel').forEach(el => {
      const t = el.textContent.trim();
      if (syms[t] && !el.dataset.tipBound) {
        el.dataset.tipBound = '1';
        el.style.cursor = 'help';
        el.addEventListener('mouseenter', ev => {
          symTip.textContent = syms[t];
          symTip.style.display = 'block';
          moveTip(ev);
          el.addEventListener('mousemove', moveTip);
        });
        el.addEventListener('mouseleave', () => {
          symTip.style.display = 'none';
          el.removeEventListener('mousemove', moveTip);
        });
      }
    });
  }
}

function moveTip(e) {
  symTip.style.left = (e.clientX + 14) + 'px';
  symTip.style.top  = (e.clientY - 10) + 'px';
}

// ── Gamer Notes ────────────────────────────────────────────────
const notesModal    = $('notes-modal');
const notesTextarea = $('notes-textarea');
const notesStatus   = $('notes-status');
const notesBtn      = $('notes-btn');
const notesPuzzleTitle = $('notes-puzzle-title');

let _notesSaveTimer = null;

function notesKey() {
  return G.puzzle ? `notes.${G.puzzle.id}` : null;
}

function loadNotes() {
  const key = notesKey();
  notesTextarea.value = key ? (localStorage.getItem(key) || '') : '';
  updateNotesBadge();
  notesStatus.textContent = '';
  if (G.puzzle) notesPuzzleTitle.textContent = G.puzzle.id;
}

function saveNotes() {
  const key = notesKey();
  if (!key) return;
  const val = notesTextarea.value;
  if (val.trim()) {
    localStorage.setItem(key, val);
  } else {
    localStorage.removeItem(key);
  }
  updateNotesBadge();
  notesStatus.textContent = 'Saved';
  setTimeout(() => { if (notesStatus.textContent === 'Saved') notesStatus.textContent = ''; }, 1800);
}

function updateNotesBadge() {
  const key = notesKey();
  const hasNote = key && !!localStorage.getItem(key);
  notesBtn.classList.toggle('has-notes', hasNote);
}

notesTextarea.addEventListener('input', () => {
  notesStatus.textContent = '…';
  clearTimeout(_notesSaveTimer);
  _notesSaveTimer = setTimeout(saveNotes, 500);
});

notesBtn.addEventListener('click', () => {
  notesModal.classList.add('open');
  notesTextarea.focus();
});

$('notes-close').addEventListener('click', () => notesModal.classList.remove('open'));

notesModal.addEventListener('click', e => {
  if (e.target === notesModal) notesModal.classList.remove('open');
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && notesModal.classList.contains('open')) {
    notesModal.classList.remove('open');
  }
});

$('notes-clear').addEventListener('click', () => {
  if (!notesTextarea.value.trim()) return;
  if (!confirm('Clear all notes for this puzzle?')) return;
  notesTextarea.value = '';
  saveNotes();
});

// ── Init ───────────────────────────────────────────────────────
(async () => {
  await loadGlobalSymbols();
  await loadTopicIndex();
  await Promise.all([preloadTopicCache(), loadConcepts()]);
})();
</script>
