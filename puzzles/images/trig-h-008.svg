<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200"><polygon points="48,165 192,165 48,90" fill="rgba(92,138,255,0.13)" stroke="#9daacc" stroke-width="1.5"/><polyline points="48,158 55,158 55,165" fill="none" stroke="#5c8aff" stroke-width="1.5"/><path d="M173,153 A22,22 0 0,0 170,165" fill="none" stroke="#f0a033" stroke-width="1.3"/><text x="120" y="181" fill="#c8d0e8" font-size="11" text-anchor="middle" font-family="sans-serif" font-weight="normal">adj</text><text x="39" y="128" fill="#c8d0e8" font-size="11" text-anchor="end" font-family="sans-serif" font-weight="normal">opp</text><text x="144" y="128" fill="#c8d0e8" font-size="11" text-anchor="middle" font-family="sans-serif" font-weight="normal">hyp</text><text x="166" y="150" fill="#f0a033" font-size="12" text-anchor="middle" font-family="sans-serif" font-weight="bold">θ</text><text x="120" y="20" fill="#c8d0e8" font-size="9" text-anchor="middle" font-family="sans-serif" font-weight="normal">sec(θ) = hyp/adj = 1/cos(θ)</text><g data-label="Adjacent (adj) — leg next to θ;  cos θ = adj/hyp" style="cursor:crosshair"><line x1="48" y1="165" x2="192" y2="165" stroke="transparent" stroke-width="14"/></g><g data-label="Opposite (opp) — leg across from θ;  sin θ = opp/hyp" style="cursor:crosshair"><line x1="48" y1="165" x2="48" y2="90" stroke="transparent" stroke-width="14"/></g><g data-label="Hypotenuse (hyp) — longest side;  sec θ = hyp/adj" style="cursor:crosshair"><line x1="192" y1="165" x2="48" y2="90" stroke="transparent" stroke-width="14"/></g><g data-label="Angle θ — reference angle;  sec θ = 1/cos θ" style="cursor:crosshair"><circle cx="192" cy="165" r="26" fill="transparent"/></g><g data-label="90° right angle" style="cursor:crosshair"><circle cx="48" cy="165" r="18" fill="transparent"/></g></svg>