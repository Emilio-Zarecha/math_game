="Left bound x = 0  (lower limit of integration)" style="cursor:crosshair"><line x1="60" y1="155" x2="60" y2="150" stroke="#445566" stroke-width="1"/><text x="60" y="167" fill="#445566" font-size="9" text-anchor="middle" font-family="sans-serif" font-weight="normal">0</text><line x1="60" y1="150" x2="60" y2="167" stroke="transparent" stroke-width="14"/></g><g data-label="Right bound x = 1  (upper limit of integration)" style="cursor:crosshair"><line x1="170" y1="155" x2="170" y2="150" stroke="#445566" stroke-width="1"/><text x="170" y="167" fill="#445566" font-size="9" text-anchor="middle" font-family="sans-serif" font-weight="normal">1</text><line x1="170" y1="150" x2="170" y2="167" stroke="transparent" stroke-width="14"/></g><g data-label="∫ x² dx  (antiderivative — find a function whose derivative is x²)" style="cursor:crosshair"><text x="120" y="16" fill="#c8d0e8" font-size="11" text-anchor="middle" font-family="sans-serif" font-weight="normal">∫ x² dx</text><circle cx="120" cy="16" r="60" fill="transparent"/></g></svg>