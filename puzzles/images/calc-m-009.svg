<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200"><g data-label="x-axis  (horizontal axis — independent variable x)" style="cursor:crosshair"><line x1="-150" y1="110" x2="230" y2="110" stroke="#445566" stroke-width="1"/><polygon points="230,107 238,110 230,113" fill="#445566" stroke="#445566" stroke-width="0"/><text x="242" y="114" fill="#445566" font-size="9" text-anchor="middle" font-family="sans-serif" font-weight="normal">x</text><line x1="-150" y1="110" x2="238" y2="110" stroke="transparent" stroke-width="10"/></g><g data-label="y-axis  (vertical axis — dependent variable y = f(x))" style="cursor:crosshair"><line x1="40" y1="135" x2="40" y2="30" stroke="#445566" stroke-width="1"/><polygon points="37,30 40,22 43,30" fill="#445566" stroke="#445566" stroke-width="0"/><text x="44" y="20" fill="#445566" font-size="9" text-anchor="middle" font-family="sans-serif" font-weight="normal">y</text><line x1="40" y1="135" x2="40" y2="30" stroke="transparent" stroke-width="10"/></g><g data-label="Curve y = sin(x) — oscillates between −1 and +1" style="cursor:crosshair"><polyline points="-39,110 -36,115 -33,121 -30,126 -27,130 -24,135 -21,139 -18,143 -15,146 -12,149 -9,152 -6,153 -3,154 -0,155 3,155 6,154 9,153 12,151 14,148 17,145 20,142 23,138 26,134 29,129 32,124 35,119 38,114 41,108 44,103 47,98 50,93 53,88 56,84 59,79 62,76 65,73 67,70 70,68 73,66 76,65 79,65 82,65 85,66 88,68 91,70 94,73 97,76 100,79 103,84 106,88 109,93 112,98 115,103 118,108 121,114 123,119 126,124 129,129 132,134 135,138 138,142 141,145 144,148 147,151 150,153 153,154 156,155 159,155 162,154 165,153 168,152 171,149 174,146 176,143 179,139 182,135 185,130 188,126 191,121 194,115 197,110" fill="none" stroke="#f0a033" stroke-width="2.2"/></g><g data-label="Tangent at x=0  (slope = cos(0) = 1 — the steepest point)" style="cursor:crosshair"><polyline points="20,146 60,74" fill="none" stroke="#5c8aff" stroke-width="2"/><line x1="20" y1="146" x2="60" y2="74" stroke="transparent" stroke-width="12"/></g><g data-label="Origin (0, 0) — sin(0) = 0; tangent touches here" style="cursor:crosshair"><circle cx="40" cy="110" r="4" fill="#f0a033" stroke="#f0a033" stroke-width="0"/><circle cx="40" cy="110" r="14" fill="transparent"/></g><g data-label="d/dx[sin(x)] = cos(x)  (derivative of sine is cosine)" style="cursor:crosshair"><text x="120" y="16" fill="#c8d0e8" font-size="10" text-anchor="middle" font-family="sans-serif" font-weight="normal">d/dx[sin(x)] = cos(x)</text><circle cx="120" cy="16" r="65" fill="transparent"/></g></svg>