<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200"><polygon points="94,120 146,120 94,80" fill="rgba(92,138,255,0.13)" stroke="#9daacc" stroke-width="1.5"/><polyline points="94,112 101,112 101,120" fill="none" stroke="#5c8aff" stroke-width="1.5"/><text x="120" y="136" fill="#c8d0e8" font-size="11" text-anchor="middle" font-family="sans-serif" font-weight="normal">adj=4</text><text x="76" y="100" fill="#c8d0e8" font-size="11" text-anchor="end" font-family="sans-serif" font-weight="normal">opp=3</text><text x="136" y="100" fill="#c8d0e8" font-size="11" text-anchor="middle" font-family="sans-serif" font-weight="normal">hyp=5</text><g data-label="Adjacent leg = 4  (base, next to the reference angle)" style="cursor:crosshair"><line x1="94" y1="120" x2="146" y2="120" stroke="transparent" stroke-width="14"/></g><g data-label="Opposite leg = 3  (vertical side, across from reference angle)" style="cursor:crosshair"><line x1="94" y1="120" x2="94" y2="80" stroke="transparent" stroke-width="14"/></g><g data-label="Hypotenuse = 5  (longest side;  3² + 4² = 5²)" style="cursor:crosshair"><line x1="146" y1="120" x2="94" y2="80" stroke="transparent" stroke-width="14"/></g><g data-label="90° right angle" style="cursor:crosshair"><circle cx="94" cy="120" r="18" fill="transparent"/></g></svg>