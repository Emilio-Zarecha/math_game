<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200"><g data-label="x-axis" style="cursor:crosshair"><line x1="35" y1="103" x2="205" y2="103" stroke="#445566" stroke-width="1"/><text x="207" y="107" fill="#445566" font-size="9" text-anchor="middle" font-family="sans-serif" font-weight="normal">x</text><line x1="35" y1="103" x2="205" y2="103" stroke="transparent" stroke-width="10"/></g><g data-label="y-axis" style="cursor:crosshair"><line x1="120" y1="188" x2="120" y2="18" stroke="#445566" stroke-width="1"/><text x="124" y="17" fill="#445566" font-size="9" text-anchor="middle" font-family="sans-serif" font-weight="normal">y</text><line x1="120" y1="188" x2="120" y2="18" stroke="transparent" stroke-width="10"/></g><g data-label="Unit circle — radius = 1" style="cursor:crosshair"><circle cx="120" cy="103" r="70" fill="none" stroke="#9daacc" stroke-width="1.5"/><circle cx="120" cy="103" r="70" fill="none" stroke="transparent" stroke-width="16"/></g><g data-label="Angle θ = 45°" style="cursor:crosshair"><path d="M142,103 A22,22 0 0,0 136,87" fill="none" stroke="#f0a033" stroke-width="1.5"/><text x="152" y="93" fill="#f0a033" font-size="10" text-anchor="middle" font-family="sans-serif" font-weight="normal">45°</text><circle cx="120" cy="103" r="32" fill="transparent"/></g><g data-label="Radius = 1  (hypotenuse of right triangle)" style="cursor:crosshair"><line x1="120" y1="103" x2="169" y2="54" stroke="#5c8aff" stroke-width="2.2"/><line x1="120" y1="103" x2="169" y2="54" stroke="transparent" stroke-width="12"/></g><g data-label="sin θ = √2/2  (vertical leg — distance from point to x-axis)" style="cursor:crosshair"><line x1="169" y1="54" x2="169" y2="103" stroke="#5c8aff" stroke-width="1" stroke-dasharray="4,3"/><line x1="169" y1="54" x2="169" y2="103" stroke="transparent" stroke-width="12"/></g><g data-label="cos θ = √2/2  (horizontal leg — distance from point to y-axis)" style="cursor:crosshair"><line x1="169" y1="54" x2="120" y2="54" stroke="#5c8aff" stroke-width="1" stroke-dasharray="4,3"/><line x1="169" y1="54" x2="120" y2="54" stroke="transparent" stroke-width="12"/></g><g data-label="Point (cos θ, sin θ) = (√2/2, √2/2)" style="cursor:crosshair"><circle cx="169" cy="54" r="4" fill="#f0a033" stroke="#f0a033" stroke-width="0"/><circle cx="169" cy="54" r="12" fill="transparent"/></g><circle cx="120" cy="103" r="2" fill="#5c8aff" stroke="#5c8aff" stroke-width="1.5"/><text x="120" y="191" fill="#c8d0e8" font-size="9" text-anchor="middle" font-family="sans-serif" font-weight="normal">1−cos²x = sin²x  →  sin²x/sinx = sinx</text></svg>