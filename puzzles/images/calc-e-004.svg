<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200"><g data-label="x-axis  (horizontal axis — independent variable x)" style="cursor:crosshair"><line x1="30" y1="140" x2="210" y2="140" stroke="#445566" stroke-width="1"/><polygon points="210,137 218,140 210,143" fill="#445566" stroke="#445566" stroke-width="0"/><text x="222" y="144" fill="#445566" font-size="9" text-anchor="middle" font-family="sans-serif" font-weight="normal">x</text><line x1="30" y1="140" x2="218" y2="140" stroke="transparent" stroke-width="10"/></g><g data-label="y-axis  (vertical axis — dependent variable y = f(x))" style="cursor:crosshair"><line x1="120" y1="165" x2="120" y2="20" stroke="#445566" stroke-width="1"/><polygon points="117,20 120,12 123,20" fill="#445566" stroke="#445566" stroke-width="0"/><text x="124" y="10" fill="#445566" font-size="9" text-anchor="middle" font-family="sans-serif" font-weight="normal">y</text><line x1="120" y1="165" x2="120" y2="20" stroke="transparent" stroke-width="10"/></g><g data-label="Horizontal line f(x) = 7 — slope is zero everywhere" style="cursor:crosshair"><line x1="30" y1="70" x2="210" y2="70" stroke="#f0a033" stroke-width="2.2"/><line x1="30" y1="70" x2="210" y2="70" stroke="transparent" stroke-width="12"/></g><g data-label="Derivative = 0  (constant functions never rise or fall)" style="cursor:crosshair"><text x="120" y="16" fill="#c8d0e8" font-size="10" text-anchor="middle" font-family="sans-serif" font-weight="normal">f(x) = 7  →  derivative = 0</text><circle cx="120" cy="16" r="65" fill="transparent"/></g></svg>