<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200"><g data-label="x-axis  (horizontal axis — independent variable x)" style="cursor:crosshair"><line x1="35" y1="130" x2="205" y2="130" stroke="#445566" stroke-width="1"/><polygon points="205,127 213,130 205,133" fill="#445566" stroke="#445566" stroke-width="0"/><text x="217" y="134" fill="#445566" font-size="9" text-anchor="middle" font-family="sans-serif" font-weight="normal">x</text><line x1="35" y1="130" x2="213" y2="130" stroke="transparent" stroke-width="10"/></g><g data-label="y-axis  (vertical axis — dependent variable y = f(x))" style="cursor:crosshair"><line x1="120" y1="155" x2="120" y2="0" stroke="#445566" stroke-width="1"/><polygon points="117,0 120,-8 123,0" fill="#445566" stroke="#445566" stroke-width="0"/><text x="124" y="-10" fill="#445566" font-size="9" text-anchor="middle" font-family="sans-serif" font-weight="normal">y</text><line x1="120" y1="155" x2="120" y2="0" stroke="transparent" stroke-width="10"/></g><g data-label="Curve f(x) = sin(x)/x — oscillates and decays away from x=0" style="cursor:crosshair"><polyline points="32,138 35,136 38,134 40,131 42,129 45,126 48,123 50,120 52,117 55,114 58,111 60,107 63,104 65,101 68,97 70,94 72,90 75,87 78,83 80,80 82,77 85,74 88,71 90,68 92,65 95,63 98,60 100,58 102,56 105,55 108,53 110,52 112,51 115,51 120,50 125,51 128,51 130,52 132,53 135,55 138,56 140,58 142,60 145,63 148,65 150,68 152,71 155,74 158,77 160,80 162,83 165,87 168,90 170,94 172,97 175,101 178,104 180,107 182,111 185,114 188,117 190,120 192,123 195,126 198,129 200,131 202,134 205,136 208,138" fill="none" stroke="#f0a033" stroke-width="2.2"/></g><g data-label="Limit value = 1  (filled dot — function approaches 1 from both sides as x→0)" style="cursor:crosshair"><circle cx="120" cy="50" r="4" fill="#f0a033" stroke="#f0a033" stroke-width="0"/><circle cx="120" cy="50" r="14" fill="transparent"/></g><g data-label="Removable discontinuity at x=0  (circle outline — sin(0)/0 is undefined, but limit = 1)" style="cursor:crosshair"><circle cx="120" cy="50" r="6" fill="none" stroke="#5c8aff" stroke-width="1.5"/><text x="138" y="42" fill="#5c8aff" font-size="10" text-anchor="middle" font-family="sans-serif" font-weight="normal">limit=1</text><circle cx="120" cy="50" r="20" fill="transparent"/></g><g data-label="lim(sin x/x) as x→0 = 1  (a fundamental limit in calculus)" style="cursor:crosshair"><text x="120" y="16" fill="#c8d0e8" font-size="10" text-anchor="middle" font-family="sans-serif" font-weight="normal">lim(sinx/x) as x→0 = 1</text><circle cx="120" cy="16" r="65" fill="transparent"/></g></svg>